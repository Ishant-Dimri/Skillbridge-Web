<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — SkillBridge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient">
  
  <!-- SAFE RESTORED HEADER -->
  <header class="nav glass">
    <div class="container nav-inner" style="display: flex; justify-content: space-between; align-items: center; padding: 0;">
      
      <!-- Original Logo & Tagline Stacked Left -->
      <a class="brand" href="index.html" style="text-decoration: none; display: flex; flex-direction: column; gap: 2px;">
        <div class="logo-glow" style="font-size: 1.5rem; font-weight: bold; color: white;">
          <span style="color: #ff5722; margin-right: 5px;">●</span>SkillBridge
        </div>
        <small class="tag" style="color: #888; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase;">Learn → Build → Showcase → Get Job Ready</small>
      </a>
      
      <!-- Navigation "Cool Box" -->
      <nav class="nav-links" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 24px; border-radius: 50px; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 20px;">
        <a href="index.html" class="nav-link home-link" style="display: flex; align-items: center; gap: 5px; color: var(--text-muted); text-decoration: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <a href="roadmap.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Skill Tracks</a>
        <a href="projects.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Projects</a>
        <a href="upload.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Upload</a>
        <a href="dashboard.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Dashboard</a>
        <a href="talent.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Talent Pool</a>
        <a href="admin.html" class="nav-link" style="color: var(--text-muted); text-decoration: none;">Admin Panel</a>
        <a href="login.html" class="btn btn-ghost" style="margin-left: 10px;">Login</a>
      </nav>
    </div>
  </header>

  <main class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 75vh;">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
      <div style="font-size: 40px; color: var(--accent1); margin-bottom: 16px;">
        <i class="fa-solid fa-fingerprint"></i>
      </div>
      <h2 style="margin: 0 0 8px 0;">Sign In</h2>
      <p class="muted small" style="margin-bottom: 24px;">Select your role to access your dashboard.</p>

      <form id="real-login-form" style="display: flex; flex-direction: column; gap: 16px;">
        
        <!-- Role Selection Dropdown with fixed background for options -->
        <select id="user-role" class="form-control" required style="background: #1a1a1a; color: white; cursor: pointer; border: 1px solid #333;">
            <option value="" disabled selected style="background: #1a1a1a;">Login as...</option>
            <option value="admin" style="background: #1a1a1a;">System Admin</option>
            <option value="student" style="background: #1a1a1a;">Student / Learner</option>
            <option value="alumni" style="background: #1a1a1a;">Alumni / Recruiter</option>
        </select>

        <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required style="background: #141414; color: white;">
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required style="background: #141414; color: white;">
        
        <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; justify-content: center; padding: 12px; margin-top: 8px;">
            Secure Login
        </button>
      </form>
      
      <div id="login-error" style="color: var(--danger); font-size: 13px; margin-top: 16px; display: none;"></div>
      
      <p class="muted" style="margin-top: 24px; font-size: 0.85rem;">
        New to SkillBridge? <a href="signup.html" style="color: var(--accent1); text-decoration: none; font-weight: 600;">Create Account</a>
      </p>
    </div>
  </main>

  <!-- Module Scripts -->
  <script type="module" src="js/login.js"></script>
  <script type="module" src="js/nav.js"></script>
</body>
</html>
