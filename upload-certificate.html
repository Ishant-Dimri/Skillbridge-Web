<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Upload Credential | SkillBridge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient">
  
  <header class="nav glass">
    <div class="container nav-inner">
      <a class="brand" href="index.html"><div class="logo-glow">SkillBridge</div></a>
      <a href="dashboard.html" class="btn btn-outline" style="color: white;">Back to Dashboard</a>
    </div>
  </header>

  <main class="container section" style="display: flex; justify-content: center;">
    <div class="glass" style="width: 100%; max-width: 500px; padding: 32px;">
      <h2 style="margin-top: 0;">Add External Credential</h2>
      <p class="muted small" style="margin-bottom: 24px;">Upload certificates from Udemy, Coursera, etc., to boost your Placement Readiness Score. Mentors will review your submission.</p>
      
      <form id="cert-upload-form">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px;">Platform (e.g., Coursera)</label>
          <input type="text" id="cert-platform" style="width: 100%; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white;" required>
        </div>
        
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px;">Course Name</label>
          <input type="text" id="cert-course" style="width: 100%; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white;" required>
        </div>

        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px;">Public Link (Optional)</label>
          <input type="url" id="cert-link" placeholder="https://..." style="width: 100%; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white;">
        </div>

        <div style="margin-bottom: 24px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px;">Upload File (PDF/Image)</label>
          <input type="file" id="cert-file" accept="image/png, image/jpeg, application/pdf" style="width: 100%; padding: 10px; color: white;" required>
        </div>

        <button type="submit" id="submit-cert-btn" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Submit for Verification</button>
      </form>
      <div id="upload-status" class="muted small" style="margin-top: 16px; text-align: center;"></div>
    </div>
  </main>

  <script type="module" src="js/upload-cert.js"></script>
</body>
</html>
