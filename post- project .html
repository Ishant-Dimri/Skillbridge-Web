<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Project | SkillBridge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">   
</head>
<body>

    <div class="post-project-container">
        <a href="admin.html" style="text-decoration: none; color: #555;">&larr; Back to Dashboard</a>
        
        <h2 style="margin-top: 15px;">Post a New Project</h2>
        <p style="color: #666;">Find the best talent blindly based on skills, not names.</p>

        <form id="post-project-form">
            
            <div>
                <label style="font-weight: bold;">Project Title / Role</label>
                <input type="text" id="project-title" placeholder="e.g., Frontend Dev for E-commerce" required class="form-control">
            </div>

            <div>
                <label style="font-weight: bold;">Required Skills (Comma separated)</label>
                <input type="text" id="project-skills" placeholder="e.g., React, Firebase, CSS" required class="form-control">
            </div>

            <div>
                <label style="font-weight: bold;">How many spots are open?</label>
                <input type="number" id="project-spots" min="1" max="10" value="1" required class="form-control">
            </div>

            <button type="submit" class="btn-primary">Post Project</button>
        </form>
        
        <div id="post-status-message" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
    </div>

    <script type="module" src="js/post-project.js"></script>
</body>
</html>
