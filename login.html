<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient">
  
  <!-- MASTER GLOBAL NAVBAR -->
  <header class="nav glass">
    <div class="container nav-inner" style="padding: 0;">
      <a class="brand" href="index.html">
        <div class="logo-glow">
          SkillBridge
        </div>
      </a>
    <nav class="nav-links">
        <a href="index.html" class="nav-link home-link">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
    </svg>
    Home
</a>
        <a href="roadmap.html">Skill Tracks</a>
        <a href="projects.html">Projects</a>
        <a href="upload.html">Upload</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="talent.html">Talent Pool</a>
        <a href="admin.html">Admin Panel</a>
        <a href="login.html" class="btn btn-ghost">Login</a>
      </nav>
    </div>
  </header>

  <main class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
      <div style="font-size: 40px; color: var(--accent1); margin-bottom: 16px;"><i class="fa-solid fa-fingerprint"></i></div>
      <h2 style="margin: 0 0 8px 0;">Sign In</h2>
      <p class="muted small" style="margin-bottom: 24px;">Enter your credentials to access your dashboard.</p>

      <form id="real-login-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; justify-content: center; padding: 12px;">Secure Login</button>
      </form>
      
      <div id="login-error" style="color: var(--danger); font-size: 13px; margin-top: 16px; display: none;"></div>
    </div>
  </main>

  <!-- Only load the modules that run the logic -->
  <script type="module" src="js/login.js"></script>
  <script type="module" src="js/nav.js"></script>
</body>
</html>
