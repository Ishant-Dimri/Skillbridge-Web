<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — SkillBridge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient">
  
  <!-- MASTER GLOBAL NAVBAR -->
  <header class="nav glass">
    <div class="container nav-inner" style="padding: 0;">
      <a class="brand" href="index.html">
        <div class="logo-glow">
          <img src="logo.png" alt="SkillBridge Logo" class="nav-logo-img" style="height: 24px; width: auto;">
          SkillBridge
        </div>
      </a>
      <nav class="nav-links" id="global-nav">
        <a href="index.html">Home</a>
        <a href="roadmap.html">Skill Tracks</a>
        <a href="projects.html">Projects</a>
        <a href="login.html" id="nav-auth-btn" class="btn btn-outline btn-sm" style="margin-left: 16px;">Login</a>
      </nav>
    </div>
  </header>

  <main class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
      <div style="font-size: 40px; color: var(--accent1); margin-bottom: 16px;"><i class="fa-solid fa-fingerprint"></i></div>
      <h2 style="margin: 0 0 8px 0;">Sign In</h2>
      <p class="muted small" style="margin-bottom: 24px;">Enter your credentials to access your dashboard.</p>

      <form id="real-login-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; justify-content: center; padding: 12px;">Secure Login</button>
      </form>
      
      <div id="login-error" style="color: var(--danger); font-size: 13px; margin-top: 16px; display: none;"></div>
    </div>
  </main>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/login.js"></script>
  <script type="module" src="js/nav.js"></script>
</body>
</html>
